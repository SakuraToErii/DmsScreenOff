<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Screen Off plugin preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101418"/>
      <stop offset="0.55" stop-color="#182024"/>
      <stop offset="1" stop-color="#24312c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>

  <g transform="translate(96 70)">
    <text x="0" y="0" fill="#e8efe8" font-family="Inter, Segoe UI, sans-serif" font-size="54" font-weight="700">Screen Off</text>
    <text x="0" y="46" fill="#b9c8bc" font-family="Inter, Segoe UI, sans-serif" font-size="24">Turn off monitors from DankBar or Control Center.</text>
  </g>

  <g filter="url(#shadow)" transform="translate(104 202)">
    <rect x="0" y="0" width="448" height="326" rx="22" fill="#1d2529" stroke="#3e4a50"/>
    <text x="34" y="56" fill="#dfe8e1" font-family="Inter, Segoe UI, sans-serif" font-size="30" font-weight="650">DankBar</text>
    <text x="34" y="92" fill="#9fb1a5" font-family="Inter, Segoe UI, sans-serif" font-size="20">Long press for 2 seconds</text>

    <rect x="34" y="138" width="380" height="78" rx="28" fill="#11171a" stroke="#314047"/>
    <circle cx="84" cy="177" r="22" fill="#92d59f"/>
    <path d="M72 165h24v17H72z" fill="#11171a"/>
    <path d="M76 169h16v8H76z" fill="#92d59f"/>
    <text x="126" y="185" fill="#dfe8e1" font-family="Inter, Segoe UI, sans-serif" font-size="22">screen off widget</text>

    <rect x="34" y="248" width="174" height="46" rx="23" fill="#92d59f"/>
    <text x="65" y="278" fill="#101418" font-family="Inter, Segoe UI, sans-serif" font-size="20" font-weight="650">Hold</text>
  </g>

  <g filter="url(#shadow)" transform="translate(640 158)">
    <rect x="0" y="0" width="520" height="424" rx="24" fill="#1d2529" stroke="#3e4a50"/>
    <text x="36" y="60" fill="#dfe8e1" font-family="Inter, Segoe UI, sans-serif" font-size="30" font-weight="650">Control Center</text>
    <text x="36" y="96" fill="#9fb1a5" font-family="Inter, Segoe UI, sans-serif" font-size="20">One click inside the widget grid</text>

    <g transform="translate(36 136)">
      <rect x="0" y="0" width="132" height="98" rx="18" fill="#273138" stroke="#44545d"/>
      <text x="24" y="58" fill="#b7c5ba" font-family="Inter, Segoe UI, sans-serif" font-size="18">Wi-Fi</text>

      <rect x="156" y="0" width="132" height="98" rx="18" fill="#273138" stroke="#44545d"/>
      <text x="178" y="58" fill="#b7c5ba" font-family="Inter, Segoe UI, sans-serif" font-size="18">Night</text>

      <rect x="312" y="0" width="132" height="98" rx="18" fill="#92d59f" stroke="#b5f0bf"/>
      <path d="M362 30h33v23h-33z" fill="#101418"/>
      <path d="M368 36h21v10h-21z" fill="#92d59f"/>
      <text x="344" y="74" fill="#101418" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700">Off</text>
    </g>

    <rect x="36" y="284" width="448" height="70" rx="24" fill="#11171a" stroke="#314047"/>
    <circle cx="80" cy="319" r="18" fill="#92d59f"/>
    <path d="M70 309h20v14H70z" fill="#11171a"/>
    <path d="M74 313h12v6H74z" fill="#92d59f"/>
    <text x="116" y="327" fill="#dfe8e1" font-family="Inter, Segoe UI, sans-serif" font-size="22">Screen Off</text>
  </g>
</svg>
